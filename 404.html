<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Keyvin Abillon</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <style>
    :root { --bg: #0A0F0D; --text: #D1D5DB; --primary: #10B981; --cta: #F59E0B; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; }
    .wrap { max-width: 480px; }
    .code { font-size: 6rem; font-weight: 800; color: var(--primary); line-height: 1; margin-bottom: 0.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; }
    p { color: #9CA3AF; margin-bottom: 2rem; line-height: 1.6; }
    a { display: inline-block; padding: 0.75rem 2rem; background: var(--cta); color: #000; font-weight: 600; text-decoration: none; border-radius: 8px; transition: transform 0.2s; }
    a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
    <a href="index.html">Back to Portfolio</a>
  </div>
</body>
</html>
