<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1200">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;600&family=Space+Grotesk:wght@700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #0F0F23;
      font-family: 'Archivo', sans-serif;
      position: relative;
    }

    /* Grid background */
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,58,237,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,58,237,0.07) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* Glow blobs */
    .blob-left {
      position: absolute;
      top: -80px;
      left: -80px;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.3) 0%, transparent 70%);
      filter: blur(40px);
    }
    .blob-right {
      position: absolute;
      bottom: -60px;
      right: -60px;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(244,63,94,0.2) 0%, transparent 70%);
      filter: blur(40px);
    }

    /* Content */
    .content {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      padding: 0 88px;
    }

    .eyebrow {
      font-family: 'Archivo', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #7C3AED;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 78px;
      font-weight: 700;
      line-height: 1.0;
      color: #F1F0FF;
      margin-bottom: 24px;
    }

    h1 .accent {
      background: linear-gradient(135deg, #7C3AED 0%, #F43F5E 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .tagline {
      font-size: 22px;
      color: rgba(241,240,255,0.6);
      margin-bottom: 44px;
      max-width: 560px;
      line-height: 1.5;
    }

    .pills {
      display: flex;
      gap: 12px;
    }

    .pill {
      padding: 8px 20px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 600;
      border: 1.5px solid rgba(124,58,237,0.5);
      color: rgba(241,240,255,0.8);
      background: rgba(124,58,237,0.1);
    }

    /* Right side — domain badge */
    .domain {
      position: absolute;
      right: 88px;
      bottom: 52px;
      z-index: 10;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: rgba(241,240,255,0.35);
      letter-spacing: 0.04em;
    }

    /* Top right — decorative bracket */
    .bracket {
      position: absolute;
      top: 52px;
      right: 88px;
      z-index: 10;
      font-size: 80px;
      font-weight: 700;
      color: rgba(124,58,237,0.15);
      font-family: 'Space Grotesk', sans-serif;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="blob-left"></div>
  <div class="blob-right"></div>

  <div class="content">
    <p class="eyebrow">Automation · SEO · CRO</p>
    <h1>Your leads<br>are <span class="accent">leaking.</span></h1>
    <p class="tagline">Building systems that generate leads, rank on Google, and convert at scale.</p>
    <div class="pills">
      <span class="pill">GHL Automation</span>
      <span class="pill">SEO Systems</span>
      <span class="pill">Google Ads</span>
      <span class="pill">CRO</span>
    </div>
  </div>

  <div class="bracket">{}</div>
  <p class="domain">keyvin.me</p>
</body>
</html>
